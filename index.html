<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flickson J | Portfolio</title>
    
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav id="navbar" class="navbar navbar-expand-lg fixed-top transition-all">
        <div class="container">
            <a class="navbar-brand" href="#home">
                <img src="images/logo.png" alt="Flickson J Logo" class="nav-logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars" style="color: var(--neon-start);"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-light" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-section">
        <div class="hero-layer hero-base-bg"></div>
        <div class="hero-layer hero-green-sweep-bg"></div>
        
        <div id="particles-container" class="particles-container"></div>
        
        <div class="hero-layer hero-subject"></div>
        <div class="hero-fade-overlay"></div>
        <div class="biometric-scanline"></div>
        
        <div class="container h-100" style="position: relative; z-index: 10;">
            <div class="row h-100 align-items-center">
                
                <div class="col-lg-8 hero-text-col d-flex flex-column align-items-center align-items-lg-start">
    
                    <div class="terminal-prompt mb-2 d-flex align-items-center">
                        <span id="prompt-symbol" class="slide-in-symbol fw-bold">&gt;</span>
                        <span id="whoami-text" class="neon-text-gradient" style="transition: opacity 0.5s ease;"></span>
                    </div>
                    
                    <div class="flickson-block d-flex flex-column align-items-center align-items-lg-start">
                        
                        <h1 id="name-text" class="display-3 fw-bold mb-2 text-white hidden-initially" style="transition: opacity 0.5s ease;">Flickson J</h1>
                        
                        <div id="typewriter-container" class="typewriter-spacer hidden-initially">
                            <div class="typewriter-absolute-box">
                                <span id="typewriter-text" class="typewriter"></span>
                            </div>
                        </div>
                        
                        <div id="action-btn" class="hidden-initially w-100 d-flex justify-content-center">
                            <a href="#about" class="scroll-indicator" aria-label="Scroll Down">
                                <i class="fa-solid fa-angles-down fa-2x neon-icon-bounce"></i>
                            </a>
                        </div>
                        
                    </div>
                </div>

            </div>
        </div>
    </section>

    <section id="about" class="placeholder-section" style="height: 3000px; padding-top: 100px; display: flex; align-items: flex-start; justify-content: center; background-color: #050505;">
        <h2 class="text-muted" style="font-family: 'Fira Code', monospace;">&lt;!-- Content to be added here --&gt;</h2>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
