<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flickson J | Portfolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@180.0.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-blue: #38bdf8;
            --text-light: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
        }

        /* Hero Banner Section */
        .hero-banner {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .name-highlight {
            color: var(--accent-blue);
            font-family: 'Fira Code', monospace;
        }

        .typewriter {
            font-size: 1.5rem;
            color: #94a3b8;
            border-right: 3px solid var(--accent-blue);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 3.5s steps(30, end), blink-caret 0.75s step-end infinite;
        }

        /* Animations */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-blue) }
        }

        .btn-custom {
            background-color: transparent;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 10px 30px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 2rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-custom:hover {
            background-color: var(--accent-blue);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>

    <section class="hero-banner">
        <div class="container">
            <div class="hero-content">
                <p class="text-uppercase tracking-widest mb-2" style="color: var(--accent-blue); letter-spacing: 3px;">Welcome to my World</p>
                <h1>I'm <span class="name-highlight">Flickson J</span></h1>
                <div class="typewriter-container">
                    <span class="typewriter">Computer Science Graduate | Developer</span>
                </div>
                <br>
                <a href="#about" class="btn-custom">Explore My Work</a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
